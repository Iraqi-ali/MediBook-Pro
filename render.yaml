services:
  - type: web
    name: medibook-pro-backend
    env: node
    region: oregon
    plan: free
    rootDirectory: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: <YOUR_MONGO_URI>
      - key: JWT_SECRET
        value: <YOUR_JWT_SECRET>
      - key: CLIENT_URL
        value: https://<YOUR_FRONTEND_SERVICE>.onrender.com
  - type: static
    name: medibook-pro-frontend
    region: oregon
    plan: free
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://<YOUR_BACKEND_SERVICE>.onrender.com/api
